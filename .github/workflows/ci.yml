name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Library build includes the CSS coverage gate — every emitted class
      # must exist in the compiled stylesheet or this step fails.
      - name: Build library (with CSS coverage gate)
        run: pnpm --filter astralis-ui build

      - name: Unit & behavior tests
        run: pnpm --filter astralis-ui test

      - name: Build docs site
        run: pnpm --filter astralis-docs build
